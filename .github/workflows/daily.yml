name: Daily article generation

# 強制 GitHub Actions 用 Node.js 24（不要用即將淘汰的 Node 20）
# 等 setup-uv 等 actions 自己更新後可以拿掉這行。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 每天台北早上 6:13 自動跑一次（= UTC 22:13 前一天）。
# 也可以從 GitHub Actions 介面點 "Run workflow" 手動觸發。
#
# ⚠️ 已知問題：GitHub Actions 的 schedule 在這個 repo 上目前不太可靠（2026-05-07
# 連續測試 4 個時段都沒自動觸發）。後備方案：用 cron-job.org 或 Cloudflare
# Workers Cron 從外部 call GitHub API 觸發。詳見 OPERATIONS.md。
on:
  schedule:
    - cron: "13 22 * * *"
  workflow_dispatch: {}

# 工作流需要把產出的文章 commit 回 repo，所以要 write 權限
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync

      # 把雲端用的 AI 設定寫進去（Gemini Free Tier：3.1 Flash Lite，500 RPD）
      # 不用 admin UI 的本機設定，因為 data/config/ai_settings.json 在 .gitignore 裡
      - name: Configure pipeline for cloud (Gemini 3.1 Flash Lite)
        run: |
          mkdir -p data/config
          cat > data/config/ai_settings.json <<'EOF'
          {
            "ai_pipeline": {
              "topic_selection":      {"provider":"gemini","model":"gemini-3.1-flash-lite","temperature":0.3,"max_tokens":4000},
              "article_synthesis":    {"provider":"gemini","model":"gemini-3.1-flash-lite","temperature":0.4,"max_tokens":6000},
              "translation":          {"provider":"gemini","model":"gemini-3.1-flash-lite","temperature":0.2,"max_tokens":6000},
              "key_terms_extraction": {"provider":"gemini","model":"gemini-3.1-flash-lite","temperature":0.3,"max_tokens":3000},
              "quiz_generation":      {"provider":"gemini","model":"gemini-3.1-flash-lite","temperature":0.5,"max_tokens":4000}
            },
            "global": {"json_retry_max":3,"stage_failure_isolation":true,"cost_cap_usd_per_run":5.0}
          }
          EOF

      - name: Phase 2 — Fetch news from RSS
        run: uv run python scripts/fetch_news.py

      - name: Phase 3 — AI pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python scripts/ai_pipeline.py

      # 即使 Phase 3 部分失敗（少數文章沒成功），把成功的部分先 commit 上去
      - name: Commit + push articles
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published/
          if git diff --cached --quiet; then
            echo "本次沒有新文章 — 跳過 commit"
            exit 0
          fi
          git commit -m "🤖 Daily articles for $(date -u '+%Y-%m-%d')"
          git push
