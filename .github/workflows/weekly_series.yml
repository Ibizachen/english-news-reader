name: Weekly Stories series generation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 每週一台北時間 09:00 自動執行（= UTC 週一 01:00）。
# 也可以從 GitHub Actions 介面點 "Run workflow" 手動觸發。
on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "手動指定主題（留空讓 AI 自動選）"
        required: false
        type: string
      publish_date:
        description: "發布日期 YYYY-MM-DD（留空用今天 UTC）"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-series:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync

      - name: Run weekly series pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          args=()
          if [ -n "${{ inputs.topic }}" ]; then
            args+=(--topic "${{ inputs.topic }}")
          fi
          if [ -n "${{ inputs.publish_date }}" ]; then
            args+=(--date "${{ inputs.publish_date }}")
          fi
          uv run python scripts/weekly_series_pipeline.py "${args[@]}"

      - name: Commit + push series
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published/ data/stories/
          if git diff --cached --quiet; then
            echo "沒有新 Stories — 跳過 commit"
            exit 0
          fi
          week=$(date -u '+%Y-W%V')
          git commit -m "🤖 Weekly Stories series for $week"
          git push
