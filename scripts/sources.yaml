# News sources for the English Reading Practice site.
#
# Each source has:
#   name:        human-readable name (used in citations on the site)
#   rss:         RSS / Atom feed URL
#   categories:  list of suggested categories (used as hints, not strict labels)
#   note:        (optional) caveat about this source
#
# Categories must match those defined in src/lib/articles.ts:
#   politics, economics, technology, energy, society,
#   health, public-health

sources:
  # === BBC ===
  - name: BBC News
    rss: https://feeds.bbci.co.uk/news/world/rss.xml
    categories: [politics, society]
  - name: BBC Business
    rss: https://feeds.bbci.co.uk/news/business/rss.xml
    categories: [economics]
  - name: BBC Technology
    rss: https://feeds.bbci.co.uk/news/technology/rss.xml
    categories: [technology]
  - name: BBC Science & Environment
    rss: https://feeds.bbci.co.uk/news/science_and_environment/rss.xml
    categories: [energy, society]
  - name: BBC Health
    rss: https://feeds.bbci.co.uk/news/health/rss.xml
    categories: [health, public-health]

  # === The Guardian ===
  - name: The Guardian World
    rss: https://www.theguardian.com/world/rss
    categories: [politics, society]
  - name: The Guardian Business
    rss: https://www.theguardian.com/business/rss
    categories: [economics]
  - name: The Guardian Technology
    rss: https://www.theguardian.com/technology/rss
    categories: [technology]
  - name: The Guardian Environment
    rss: https://www.theguardian.com/environment/rss
    categories: [energy, society]
  - name: The Guardian Health
    rss: https://www.theguardian.com/society/health/rss
    categories: [health, public-health]

  # === NPR ===
  - name: NPR News
    rss: https://feeds.npr.org/1001/rss.xml
    categories: [politics, society]
  - name: NPR Business
    rss: https://feeds.npr.org/1006/rss.xml
    categories: [economics]
  - name: NPR Health
    rss: https://feeds.npr.org/1128/rss.xml
    categories: [health, public-health]

  # === AP, Al Jazeera, DW ===
  - name: AP News Top
    rss: https://rsshub.app/apnews/topics/apf-topnews
    categories: [politics, society, economics]
    note: "AP has no official RSS; uses public RSSHub. May break if RSSHub instance is down."
  - name: Al Jazeera English
    rss: https://www.aljazeera.com/xml/rss/all.xml
    categories: [politics, society]
  - name: Deutsche Welle (DW) Top
    rss: https://rss.dw.com/rdf/rss-en-top
    categories: [politics, economics, society]

  # === Reuters (via Google News) ===
  - name: Reuters World (via Google News)
    rss: https://news.google.com/rss/search?q=when:24h+allinurl:reuters.com&hl=en-US&gl=US&ceid=US:en
    categories: [politics, economics, society]
    note: "Reuters removed direct RSS in 2020; we use Google News as a workaround. Links will go through news.google.com redirects."

  # === Tech ===
  - name: Ars Technica
    rss: https://feeds.arstechnica.com/arstechnica/index
    categories: [technology]
  - name: The Verge
    rss: https://www.theverge.com/rss/index.xml
    categories: [technology]

  # === Politics ===
  - name: POLITICO
    rss: https://www.politico.com/rss/politicopicks.xml
    categories: [politics]

  # === Specialised health / medicine ===
  - name: STAT News
    rss: https://www.statnews.com/feed/
    categories: [health]
    note: "Specialised in medicine, biotech, and clinical research."
  - name: WHO News
    rss: https://www.who.int/rss-feeds/news-english.xml
    categories: [public-health]
    note: "Authoritative source for global public health."

  # === Added in v2.3.0 — health & public-health expansion =====================
  # Goal: give the AI enough material to consistently surface medicine and
  # public-health stories every day. Mix of news outlets (BMJ News,
  # MedPage Today, KFF), institutional sources (CDC MMWR), and "research
  # news" sites (The Conversation, EurekAlert) that summarise journal
  # papers in news form.

  - name: BMJ News
    rss: https://www.bmj.com/news/news.rss
    categories: [health, public-health]
    note: "British Medical Journal news section (not research papers — their journalism)."

  - name: MedPage Today
    rss: https://www.medpagetoday.com/rss/headlines.xml
    categories: [health]
    note: "Clinical medicine news for healthcare professionals; high signal."

  - name: KFF Health News
    rss: https://kffhealthnews.org/feed/
    categories: [public-health, health]
    note: "Independent US health policy journalism (formerly Kaiser Health News)."

  - name: CDC MMWR
    rss: https://tools.cdc.gov/api/v2/resources/media/316423.rss
    categories: [public-health]
    note: "CDC Morbidity and Mortality Weekly Report — gold standard epidemiology."

  - name: Lancet Public Health
    rss: https://www.thelancet.com/rssfeed/lanpub_current.xml
    categories: [public-health, health]
    note: "Top journal Public Health section press releases."

  - name: EurekAlert Medicine & Health
    rss: https://www.eurekalert.org/rss/medicine_health.xml
    categories: [health, public-health]
    note: "AAAS science press release aggregator — universities/journals submit research news."

  # The Conversation — academics writing for general public, multi-topic.
  # Adding their health, public health, and a few other strong topics gives
  # us bonus coverage in politics/economics too.
  - name: The Conversation Health
    rss: https://theconversation.com/global/topics/health-66/articles.atom
    categories: [health, public-health]
    note: "Researchers writing for general readers — perfect B1-B2 level."

  - name: The Conversation Medicine
    rss: https://theconversation.com/global/topics/medicine-148/articles.atom
    categories: [health]

  - name: The Conversation Public Health
    rss: https://theconversation.com/global/topics/public-health-3617/articles.atom
    categories: [public-health]

  - name: The Conversation Politics
    rss: https://theconversation.com/global/topics/politics-13/articles.atom
    categories: [politics]
    note: "Bonus politics coverage from academics — a counterweight to mainstream news cycles."
